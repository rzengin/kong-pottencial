services:
  # -------------------------------------------------------
  # Backend Mock: Echo Server
  # Simula qualquer backend real da Pottencial.
  # Reflete todos os headers e body recebidos do Kong —
  # ideal para validar transformações.
  # -------------------------------------------------------
  echo-server:
    image: ealen/echo-server
    container_name: echo-server
    ports:
      - "8080:80"
    environment:
      - PORT=80

  # -------------------------------------------------------
  # Auth Server Mock: Keycloak
  # Substitui o Hefesto (serviço de autenticação interno)
  # permitindo emular o IDP (Identity Provider) OAuth2/OIDC
  # localmente sem dependência de infraestrutura corporativa.
  # -------------------------------------------------------
  auth-server:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: auth-server
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev

  # -------------------------------------------------------
  # API Mock: WireMock
  # Simula respostas de APIs de backend (cotações, apólices)
  # sem necessidade de conexão com sistemas internos.
  # Use para testes unitários de integração no gateway.
  # -------------------------------------------------------
  api-mock:
    image: wiremock/wiremock:3.5.4
    container_name: api-mock
    ports:
      - "8082:8080"
    volumes:
      - ./mocks:/home/wiremock
    command: --verbose

  # -------------------------------------------------------
  # Observability Mock: Jaeger
  # Substituto visual para o Datadog Agent.
  # Recebe traces nativos do Kong via OTLP (porta 4318)
  # UI disponível em http://localhost:16686
  # -------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
